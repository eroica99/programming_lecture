<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로그래밍(파이썬) 학습자료</title>
<style>
:root {
  --bg: #f8f8f6;
  --surface: #fff;
  --border: #e0e0dc;
  --text: #1a1a1a;
  --muted: #888;
  --u1: #2c4a7c;
  --u1-light: #eef2fa;
  --u2: #2a6b3c;
  --u2-light: #eaf4ee;
  --u3: #7c3c2c;
  --u3-light: #faeee8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Malgun Gothic','맑은 고딕', Apple SD Gothic Neo, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px;
  display: flex; height: 100dvh; overflow: hidden;
}

/* ── 사이드바 ── */
#sidebar {
  width: 260px; min-width: 260px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width .22s cubic-bezier(.4,0,.2,1),
              min-width .22s cubic-bezier(.4,0,.2,1);
  z-index: 10;
}
#sidebar.collapsed { width: 0; min-width: 0; }
.sidebar-header {
  padding: 1rem 1.1rem .75rem; border-bottom: 1px solid var(--border);
  flex-shrink: 0; cursor: pointer; transition: background .12s;
}
.sidebar-header:hover { background: var(--bg); }
.sidebar-logo { font-size: 10.5px; font-weight: 700; letter-spacing: .1em; color: var(--muted); margin-bottom: .25rem; }
.sidebar-title { font-size: 15px; font-weight: 700; line-height: 1.35; }
.sidebar-sub { font-size: 11px; color: var(--muted); margin-top: .2rem; }
.sidebar-home-hint {
  font-size: 10px; color: var(--muted); margin-top: .35rem;
  display: flex; align-items: center; gap: .3rem; opacity: .7;
}
.sidebar-nav { flex: 1; overflow-y: auto; padding: .5rem 0 1rem; }
.nav-group { margin-bottom: .25rem; }
.nav-group-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: .1em;
  padding: .6rem 1.1rem .3rem;
  display: flex; align-items: center; gap: .5rem;
}
.unit-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.u1 .unit-dot { background: var(--u1); }
.u2 .unit-dot { background: var(--u2); }
.u3 .unit-dot { background: var(--u3); }
.u1 .nav-group-label { color: var(--u1); }
.u2 .nav-group-label { color: var(--u2); }
.u3 .nav-group-label { color: var(--u3); }
.nav-item {
  display: flex; align-items: center; gap: .65rem;
  padding: .48rem 1.1rem .48rem 1.35rem;
  cursor: pointer; border-left: 2px solid transparent;
  transition: background .12s, border-color .12s;
  font-size: 13px;
}
.nav-item:hover { background: var(--bg); }
.nav-item.active { font-weight: 700; background: var(--bg); }
.u1 .nav-item.active { border-left-color: var(--u1); color: var(--u1); }
.u2 .nav-item.active { border-left-color: var(--u2); color: var(--u2); }
.u3 .nav-item.active { border-left-color: var(--u3); color: var(--u3); }
.nav-code { font-size: 10.5px; font-weight: 700; min-width: 38px; font-family: monospace; flex-shrink: 0; }

/* ── 본문 ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Topbar ── */
.topbar {
  height: 48px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .5rem; padding: 0 .85rem;
  flex-shrink: 0;
}
.tb-btn {
  background: none; border: 1px solid var(--border); border-radius: 5px;
  height: 30px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--text); padding: 0 .55rem; gap: .3rem;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--bg); border-color: #bbb; }
.tb-btn:disabled { opacity: .3; cursor: default; }
.tb-btn.home-btn { font-weight: 700; }
.tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 .2rem; }
.topbar-breadcrumb {
  font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.topbar-breadcrumb strong { color: var(--text); font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: .4rem; flex-shrink: 0; }
.chip {
  font-size: 11px; padding: 3px 9px; border-radius: 3px;
  border: 1px solid var(--border); color: var(--muted); background: var(--bg); white-space: nowrap;
}
.chip.u1 { background: var(--u1-light); color: var(--u1); border-color: #bfcde8; }
.chip.u2 { background: var(--u2-light); color: var(--u2); border-color: #b5d8be; }
.chip.u3 { background: var(--u3-light); color: var(--u3); border-color: #e8c8be; }
.counter { font-size: 11.5px; color: var(--muted); white-space: nowrap; }

/* ── 콘텐츠 ── */
#content-area { flex: 1; position: relative; background: var(--bg); }
iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* ── 플로팅 네비 바 ── */
#float-nav {
  position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
  background: rgba(26,26,26,.88); backdrop-filter: blur(8px);
  border-radius: 999px; display: none; align-items: center; gap: .2rem;
  padding: .35rem .5rem; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  transition: opacity .2s;
}
#float-nav.visible { display: flex; }
.fn-btn {
  background: none; border: none; cursor: pointer;
  color: #fff; font-size: 13px; padding: .35rem .7rem;
  border-radius: 999px; display: flex; align-items: center; gap: .3rem;
  transition: background .12s; white-space: nowrap;
}
.fn-btn:hover { background: rgba(255,255,255,.15); }
.fn-btn:disabled { opacity: .3; cursor: default; }
.fn-btn.home-fn { font-weight: 700; color: #ffdd88; }
.fn-sep { width: 1px; height: 16px; background: rgba(255,255,255,.2); margin: 0 .15rem; }
.fn-label { font-size: 11.5px; color: rgba(255,255,255,.6); padding: 0 .4rem; white-space: nowrap; }

/* ── 키보드 힌트 ── */
#kb-hint {
  position: absolute; bottom: 4rem; left: 50%; transform: translateX(-50%);
  background: rgba(26,26,26,.7); color: rgba(255,255,255,.75);
  font-size: 11px; padding: .3rem .75rem; border-radius: 999px;
  z-index: 99; pointer-events: none; display: none;
  animation: fadeout 2.5s forwards;
}
@keyframes fadeout { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

/* ── 홈 화면 ── */
#home {
  position: absolute; inset: 0; overflow-y: auto;
  display: flex; flex-direction: column; align-items: center;
  padding: 2.5rem 1.5rem 3rem; gap: 2rem;
}
.home-hero { text-align: center; max-width: 520px; }
.home-hero-sub { font-size: 11.5px; font-weight: 700; letter-spacing: .12em; color: var(--muted); margin-bottom: .6rem; }
.home-hero-title { font-size: 26px; font-weight: 700; line-height: 1.3; margin-bottom: .55rem; }
.home-hero-desc { font-size: 13.5px; color: #555; line-height: 1.75; }
.home-stats { display: flex; gap: 1.25rem; flex-wrap: wrap; justify-content: center; }
.stat-box {
  border: 1px solid var(--border); border-radius: 6px;
  padding: .75rem 1.25rem; background: var(--surface); text-align: center; min-width: 90px;
}
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 11.5px; color: var(--muted); }
.home-units { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 1.25rem; }
.unit-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  display: flex; align-items: center; gap: .5rem;
  padding-bottom: .35rem; border-bottom: 1.5px solid var(--border); margin-bottom: .55rem;
}
.unit-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); gap: .55rem; }
.unit-card {
  border: 1px solid var(--border); border-radius: 6px;
  padding: .75rem .9rem; background: var(--surface);
  cursor: pointer; transition: box-shadow .12s, transform .12s;
  display: flex; flex-direction: column; gap: .15rem;
}
.unit-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.09); transform: translateY(-1px); }
.uc-code { font-size: 10.5px; font-weight: 700; font-family: monospace; }
.uc-title { font-size: 13px; font-weight: 700; line-height: 1.4; }
.u1 .unit-card { border-left: 3px solid var(--u1); }
.u1 .uc-code { color: var(--u1); }
.u2 .unit-card { border-left: 3px solid var(--u2); }
.u2 .uc-code { color: var(--u2); }
.u3 .unit-card { border-left: 3px solid var(--u3); }
.u3 .uc-code { color: var(--u3); }

@media (max-width: 680px) {
  #sidebar { width: 220px; min-width: 220px; }
  #sidebar.collapsed { width: 0; min-width: 0; }
  .tb-btn span { display: none; }
}
</style>
</head>
<body>

<!-- 사이드바 -->
<nav id="sidebar">
  <div class="sidebar-header" onclick="showHome()" title="홈으로">
    <div class="sidebar-logo">프로그래밍(파이썬)</div>
    <div class="sidebar-title">고등학교 2학년<br>학습자료 모음</div>
    <div class="sidebar-sub">전체 13개 단원</div>
    <div class="sidebar-home-hint">↩ 클릭하면 목록으로 돌아갑니다</div>
  </div>
  <div class="sidebar-nav" id="nav-list"></div>
</nav>

<!-- 본문 -->
<div id="main">

  <!-- Topbar -->
  <div class="topbar">
    <!-- 사이드바 토글 -->
    <button class="tb-btn" onclick="toggleSidebar()" title="사이드바 열기/닫기 (단축키 S)">☰</button>

    <!-- 홈 버튼 -->
    <button class="tb-btn home-btn" onclick="showHome()" id="home-btn" title="목록으로 (단축키 ESC)">
      🏠 <span>목록</span>
    </button>

    <div class="tb-sep"></div>

    <!-- 이전 / 다음 -->
    <button class="tb-btn" id="btn-prev" onclick="goPrev()" disabled title="이전 단원 (단축키 ←)">
      ← <span>이전</span>
    </button>
    <button class="tb-btn" id="btn-next" onclick="goNext()" disabled title="다음 단원 (단축키 →)">
      <span>다음</span> →
    </button>

    <div class="tb-sep"></div>

    <!-- 브레드크럼 -->
    <div class="topbar-breadcrumb" id="breadcrumb">학습자료 목록</div>

    <!-- 단원 칩 + 진행 카운터 -->
    <div class="topbar-right">
      <span class="counter" id="counter"></span>
      <span class="chip" id="unit-chip">전체 보기</span>
    </div>
  </div>

  <!-- 콘텐츠 영역 -->
  <div id="content-area">
    <div id="home"></div>
    <iframe id="viewer" style="display:none"></iframe>

    <!-- 플로팅 네비 바 (학습자료 뷰 중에만 표시) -->
    <div id="float-nav">
      <button class="fn-btn home-fn" onclick="showHome()" title="목록으로 (ESC)">🏠 목록</button>
      <div class="fn-sep"></div>
      <button class="fn-btn" id="fn-prev" onclick="goPrev()" disabled title="이전 (←)">← 이전</button>
      <div class="fn-label" id="fn-label">1 / 13</div>
      <button class="fn-btn" id="fn-next" onclick="goNext()" disabled title="다음 (→)">다음 →</button>
    </div>

    <!-- 키보드 단축키 힌트 -->
    <div id="kb-hint"></div>
  </div>

</div>

KCV64u1IOuLq+q4sCcgOiAn7KCV64u1IO2ZleyduCc7Cn0KPC9zY3JpcHQ+CjwvYm9keT4KPC9odG1sPgo="}
];
const UNITS = {
  "1": { label: "Ⅰ단원. 프로그래밍의 개요",      cls: "u1" },
  "2": { label: "Ⅱ단원. 프로그래밍의 기초",      cls: "u2" },
  "3": { label: "Ⅲ단원. 프로그램의 설계와 구현", cls: "u3" },
};

let currentIdx = -1;
let sidebarOpen = true;

/* ── 사이드바 빌드 ── */
function buildNav() {
  const nav = document.getElementById('nav-list');
  let curUnit = null, group = null;
  FILES.forEach((item, i) => {
    if (item.unit !== curUnit) {
      curUnit = item.unit;
      const u = UNITS[curUnit];
      group = document.createElement('div');
      group.className = `nav-group ${u.cls}`;
      group.innerHTML = `<div class="nav-group-label"><span class="unit-dot"></span>${u.label}</div>`;
      nav.appendChild(group);
    }
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.idx = i;
    el.innerHTML = `<span class="nav-code">${item.code}</span><span>${item.title}</span>`;
    el.onclick = () => loadItem(i);
    group.appendChild(el);
  });
}

/* ── 홈 빌드 ── */
function buildHome() {
  const home = document.getElementById('home');
  home.innerHTML = `
    <div class="home-hero">
      <div class="home-hero-sub">2025 · 고등학교 2학년</div>
      <div class="home-hero-title">프로그래밍(파이썬)<br>단원별 학습자료</div>
      <div class="home-hero-desc">단원을 클릭하여 학습을 시작하세요.<br>학습 중에는 <strong>상단 버튼</strong>, <strong>하단 플로팅 바</strong>, <strong>키보드(ESC·←·→)</strong>로 이동할 수 있습니다.</div>
    </div>
    <div class="home-stats">
      <div class="stat-box"><div class="stat-num">3</div><div class="stat-label">단원</div></div>
      <div class="stat-box"><div class="stat-num">13</div><div class="stat-label">학습자료</div></div>
      <div class="stat-box"><div class="stat-num">65+</div><div class="stat-label">확인 문제</div></div>
    </div>
    <div class="home-units" id="home-units"></div>
  `;
  const container = document.getElementById('home-units');
  ["1","2","3"].forEach(unitKey => {
    const u = UNITS[unitKey];
    const items = FILES.filter(f => f.unit === unitKey);
    const sec = document.createElement('div');
    sec.className = u.cls;
    sec.innerHTML = `
      <div class="unit-section-title"><span class="unit-dot"></span>${u.label}</div>
      <div class="unit-cards" id="cards-${unitKey}"></div>`;
    container.appendChild(sec);
    const grid = sec.querySelector(`#cards-${unitKey}`);
    items.forEach(item => {
      const idx = FILES.indexOf(item);
      const card = document.createElement('div');
      card.className = 'unit-card';
      card.innerHTML = `<div class="uc-code">${item.code}</div><div class="uc-title">${item.title}</div>`;
      card.onclick = () => loadItem(idx);
      grid.appendChild(card);
    });
  });
}

/* ── 학습자료 로드 ── */
function loadItem(idx) {
  currentIdx = idx;
  const item = FILES[idx];
  const u = UNITS[item.unit];

  document.getElementById('viewer').style.display = 'block';
  document.getElementById('viewer').src = `data:text/html;charset=utf-8;base64,${item.b64}`;
  document.getElementById('home').style.display = 'none';
  document.getElementById('float-nav').classList.add('visible');

  // 사이드바 활성
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-idx="${idx}"]`);
  if (navEl) { navEl.classList.add('active'); navEl.scrollIntoView({block:'nearest'}); }

  // topbar
  document.getElementById('breadcrumb').innerHTML =
    `<span style="color:var(--muted)">${u.label} ›</span> <strong>${item.code} ${item.title}</strong>`;
  const chip = document.getElementById('unit-chip');
  chip.textContent = u.label.split('.')[0];
  chip.className = `chip ${u.cls}`;
  document.getElementById('counter').textContent = `${idx+1} / ${FILES.length}`;

  // 이전/다음 버튼 상태
  updateNavBtns();

  // 플로팅 라벨
  document.getElementById('fn-label').textContent = `${idx+1} / ${FILES.length}`;
}

/* ── 홈으로 ── */
function showHome() {
  currentIdx = -1;
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
  document.getElementById('float-nav').classList.remove('visible');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('breadcrumb').textContent = '학습자료 목록';
  const chip = document.getElementById('unit-chip');
  chip.textContent = '전체 보기'; chip.className = 'chip';
  document.getElementById('counter').textContent = '';
  updateNavBtns();
}

/* ── 이전 / 다음 ── */
function goPrev() {
  if (currentIdx > 0) loadItem(currentIdx - 1);
}
function goNext() {
  if (currentIdx < FILES.length - 1) loadItem(currentIdx + 1);
}

function updateNavBtns() {
  const onHome = currentIdx === -1;
  const prevOk = !onHome && currentIdx > 0;
  const nextOk = !onHome && currentIdx < FILES.length - 1;

  document.getElementById('btn-prev').disabled = !prevOk;
  document.getElementById('btn-next').disabled = !nextOk;
  document.getElementById('fn-prev').disabled = !prevOk;
  document.getElementById('fn-next').disabled = !nextOk;
  document.getElementById('home-btn').disabled = onHome;
}

/* ── 사이드바 토글 ── */
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

/* ── 키보드 단축키 ── */
function showKbHint(msg) {
  const el = document.getElementById('kb-hint');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth; // reflow
  el.style.animation = 'fadeout 2.5s forwards';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

document.addEventListener('keydown', e => {
  // 입력 필드 포커스 중엔 무시
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;

  if (e.key === 'Escape' && currentIdx !== -1) {
    showHome();
    showKbHint('ESC → 목록으로');
  } else if (e.key === 'ArrowLeft' && currentIdx > 0) {
    goPrev();
    showKbHint('← 이전 단원');
  } else if (e.key === 'ArrowRight' && currentIdx >= 0 && currentIdx < FILES.length - 1) {
    goNext();
    showKbHint('→ 다음 단원');
  } else if (e.key === 's' || e.key === 'S') {
    toggleSidebar();
  }
});

buildNav();
buildHome();
updateNavBtns();
</script>
</body>
</html>
